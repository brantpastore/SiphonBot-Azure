apiVersion: "2023-10-01"
kind: ContainerApp
properties:
  name: "<container-app-name>"
  location: "<location>"
  configuration:
    activeRevisionsMode: Single
  template:
    containers:
      - name: siphonbot
        image: "<ACR_LOGIN_SERVER>/<IMAGE_NAME>:<TAG>"
        resources:
          cpu: 0.5
          memory: "1Gi"
    scale:
      minReplicas: 0
      maxReplicas: 1

# This is a template — prefer deploying via the Bicep template or the CLI.
